version: '3.8'

services:
  # Брокер повідомлень
  redis:
    image: redis:7-alpine
    container_name: coreops_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

# База даних
  db:
    image: postgres:15-alpine
    container_name: coreops_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  redis_data:
  postgres_data: